<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #232f3e, #131921);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#febd69;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#f3a847;
}

.switch{
    text-align:center;
    margin-top:10px;
}

.switch a{
    color:#007185;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">
        <input type="text" id="loginValue" placeholder="Username or Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="switch">
        New user? <a href="signup.html">Create account</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const loginValue = document.getElementById("loginValue").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!loginValue || !password){
        alert("All fields are required!");
        return;
    }

    try {
        const res = await fetch("http://localhost:8000/users/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: loginValue,
                password
            })
        });

        const data = await res.json();

        if(res.status === 200){
            console.log("SUCCESS DATA:", data);

            localStorage.setItem("token", data.token);

            if(data.user){
                localStorage.setItem("username", data.user.username);
            }

            alert("Login Successful!");
            window.location.href = "index.html";
        } else {
            console.log("ERROR DATA:", data);
            alert(data.message || "Login failed");
        }
            } catch(err){
                alert("Server error. Is backend running?");
                console.error(err);
            }
        });
</script>

</body>
</html>
